; PJSIP config for the pjsocky live-test PBX.
;
; One registerable endpoint (1000, password below - throwaway test
; credentials, loopback only) used by tests/protocol/test_live_call.py.
; The container runs with --network=host, so everything stays on
; 127.0.0.1; port 5080 avoids pjsocky's own UDP transport on 5060.

[transport-udp]
type = transport
protocol = udp
bind = 127.0.0.1:5080

[auth1000]
type = auth
auth_type = userpass
username = 1000
password = pjsocky-test

[1000]
type = aor
max_contacts = 5
remove_existing = yes

[1000]
type = endpoint
context = pjsocky-test
message_context = pjsocky-messages
disallow = all
allow = ulaw,alaw,h264
direct_media = no
auth = auth1000
aors = 1000
