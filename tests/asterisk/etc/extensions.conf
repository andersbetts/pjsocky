; Dialplan for the pjsocky live-test PBX.

[pjsocky-test]
; 600: auto-answering echo test. Echo() bounces audio *and* video
; frames back to the caller, so it exercises both media paths without
; needing a second live participant - this is what
; PJSOCKY_TEST_ASTERISK_PEER_URI points at.
exten => 600,1,Answer()
 same => n,Echo()

[pjsocky-messages]
; Out-of-dialog SIP MESSAGE handling: reaching the dialplan at all is
; what makes Asterisk send the 2xx delivery status that
; test_im_send_and_message_status asserts on.
exten => _X.,1,NoOp(MESSAGE from ${MESSAGE(from)}: ${MESSAGE(body)})
 same => n,Hangup()
